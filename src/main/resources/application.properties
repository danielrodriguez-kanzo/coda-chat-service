spring.application.name=coda-chat-service

server.port=${PORT:${SERVER_PORT:8082}}

logging.level.root=INFO
logging.level.com.danielrodriguez.codachat=DEBUG

#######################
# Security
#######################

app.api-key=${APP_API_KEY:dev-secret-key}

#######################
# Chat Providers
#######################

# Chat provider for sendMessage endpoint
chat.provider=${CHAT_PROVIDER:mock}

# DM Link provider
chat.dm.provider=${CHAT_DM_PROVIDER:mock}

#######################
# Webhook Provider
#######################

chat.webhook-url=${CHAT_WEBHOOK_URL:}

#######################
# Google Chat API
#######################

google.chat.base-url=https://chat.googleapis.com/v1

google.chat.credentials-path=${GOOGLE_CHAT_CREDENTIALS:}

google.chat.scope=https://www.googleapis.com/auth/chat.bot

